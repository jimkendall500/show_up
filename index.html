<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Show Up">
<meta name="theme-color" content="#0f172a">
<title>Show Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f172a;
    --navy2: #1e293b;
    --slate: #64748b;
    --light: #f8fafc;
    --border: #e2e8f0;
    --green: #22c55e;
    --green-bg: #f0fdf4;
    --green-border: #86efac;
    --green-text: #15803d;
    --yellow: #eab308;
    --yellow-bg: #fefce8;
    --yellow-border: #fde047;
    --yellow-text: #a16207;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --red-border: #fca5a5;
    --red-text: #b91c1c;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--light);
    color: var(--navy);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input { font-family: inherit; }

  /* Header */
  .header {
    background: var(--navy);
    color: #fff;
    padding: calc(1.25rem + var(--safe-top)) 1.25rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding-bottom: 1rem;
  }
  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .app-date { color: #94a3b8; font-size: 0.82rem; margin-top: 0.25rem; }
  .btn-add-top {
    background: #fff;
    color: var(--navy);
    padding: 0.5rem 1rem;
    border-radius: 0.75rem;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .stats-row {
    display: flex;
    gap: 0.6rem;
    padding-bottom: 1rem;
  }
  .stat-chip {
    background: rgba(255,255,255,0.1);
    border-radius: 0.65rem;
    padding: 0.45rem 0.75rem;
    font-size: 0.75rem;
  }
  .stat-val { font-weight: 700; font-size: 0.95rem; }
  .stat-label { color: #94a3b8; font-size: 0.68rem; }

  /* Nav */
  .nav {
    background: var(--navy);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
  }
  .nav-btn {
    padding: 0.6rem 1.25rem;
    font-weight: 600;
    font-size: 0.8rem;
    color: #64748b;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .nav-btn.active { color: #fff; border-bottom-color: #fff; }

  /* Main content */
  .main { max-width: 600px; margin: 0 auto; padding: 1.25rem 1rem calc(1.5rem + var(--safe-bottom)); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 4rem 1rem;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .empty h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 0.6rem;
  }
  .empty p { color: var(--slate); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
  .btn-primary-lg {
    background: var(--navy);
    color: #fff;
    padding: 0.75rem 1.75rem;
    border-radius: 0.875rem;
    font-weight: 700;
    font-size: 0.9rem;
    display: inline-block;
  }

  /* Habit cards */
  .habits-list { display: flex; flex-direction: column; gap: 1rem; }
  .habit-card {
    background: #fff;
    border-radius: 1.25rem;
    border: 1.5px solid var(--border);
    padding: 1.1rem 1.25rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .habit-card.status-green { border-color: var(--green-border); box-shadow: 0 4px 20px rgba(34,197,94,0.12); }
  .habit-card.status-yellow { border-color: var(--yellow-border); box-shadow: 0 4px 20px rgba(234,179,8,0.12); }
  .habit-card.status-red { border-color: var(--red-border); box-shadow: 0 4px 20px rgba(239,68,68,0.12); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.2rem; }
  .habit-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .streak-badge {
    background: var(--navy);
    color: #fff;
    font-size: 0.68rem;
    font-weight: 700;
    border-radius: 999px;
    padding: 2px 8px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .card-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
  .icon-btn { padding: 0.25rem; border-radius: 0.4rem; font-size: 0.85rem; opacity: 0.7; }
  .icon-btn:hover { opacity: 1; background: var(--light); }

  .status-line {
    font-size: 0.78rem;
    margin-bottom: 0.85rem;
    font-weight: 500;
  }
  .status-line.none { color: var(--slate); font-weight: 400; }
  .status-line.green { color: var(--green-text); }
  .status-line.yellow { color: var(--yellow-text); }
  .status-line.red { color: var(--red-text); }

  /* Mark buttons */
  .mark-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.85rem; }
  .mark-btn {
    display: flex; align-items: center; gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--slate);
    transition: all 0.15s;
  }
  .mark-btn.active-green { border-color: var(--green); background: var(--green-bg); color: var(--green-text); }
  .mark-btn.active-yellow { border-color: var(--yellow); background: var(--yellow-bg); color: var(--yellow-text); }
  .mark-btn.active-red { border-color: var(--red); background: var(--red-bg); color: var(--red-text); }

  /* Context banner */
  .context-banner {
    border-radius: 0.5rem;
    padding: 0.5rem 0.75rem;
    font-size: 0.78rem;
    margin-bottom: 0.75rem;
    line-height: 1.4;
  }
  .context-banner.green { background: var(--green-bg); color: var(--green-text); }
  .context-banner.yellow { background: var(--yellow-bg); color: var(--yellow-text); }

  /* History toggle */
  .history-toggle {
    font-size: 0.73rem;
    color: var(--slate);
    padding: 0.25rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 0.4rem;
    background: #fff;
  }
  .dots-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 0.65rem; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    background: var(--border);
  }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red { background: var(--red); }
  .dot-stats { display: flex; gap: 1rem; margin-top: 0.4rem; font-size: 0.7rem; color: var(--slate); }

  /* Completion card */
  .completion-card {
    text-align: center;
    padding: 1.5rem;
    background: linear-gradient(135deg, #0f172a, #1e3a5f);
    border-radius: 1.25rem;
    color: #fff;
    margin-top: 0.25rem;
  }
  .completion-icon { font-size: 1.75rem; margin-bottom: 0.5rem; }
  .completion-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
  .completion-sub { color: #94a3b8; font-size: 0.8rem; margin-top: 0.3rem; }

  /* About view */
  .about-section { display: flex; flex-direction: column; gap: 1rem; }
  .about-card {
    background: #fff;
    border-radius: 1.25rem;
    padding: 1.4rem 1.5rem;
    border: 1.5px solid var(--border);
  }
  .about-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    margin-bottom: 0.75rem;
  }
  .about-card p { color: #374151; line-height: 1.7; font-size: 0.88rem; }
  .about-status-card {
    border-radius: 1.25rem;
    padding: 1.2rem 1.4rem;
  }
  .about-status-card.green { background: var(--green-bg); border: 1.5px solid var(--green-border); }
  .about-status-card.yellow { background: var(--yellow-bg); border: 1.5px solid var(--yellow-border); }
  .about-status-card.red { background: var(--red-bg); border: 1.5px solid var(--red-border); }
  .about-status-title { font-weight: 700; font-size: 0.88rem; margin-bottom: 0.4rem; }
  .about-status-title.green { color: var(--green-text); }
  .about-status-title.yellow { color: var(--yellow-text); }
  .about-status-title.red { color: var(--red-text); }
  .about-status-card p { color: #374151; line-height: 1.6; font-size: 0.84rem; }
  .quote-card {
    background: var(--navy);
    border-radius: 1.25rem;
    padding: 1.4rem 1.5rem;
    color: #e2e8f0;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 1rem;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box {
    background: #fff;
    border-radius: 1.25rem;
    padding: 1.75rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.18);
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    margin-bottom: 1.4rem;
  }
  .form-stack { display: flex; flex-direction: column; gap: 0.9rem; }
  .form-label { display: block; font-size: 0.78rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; letter-spacing: 0.02em; }
  .form-input {
    width: 100%; padding: 0.6rem 0.85rem;
    border-radius: 0.6rem; border: 1.5px solid var(--border);
    font-size: 0.9rem; outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--navy); }
  .form-group { border-radius: 0.75rem; padding: 0.9rem 1rem; }
  .form-group.green { background: var(--green-bg); border: 1px solid var(--green-border); }
  .form-group.yellow { background: var(--yellow-bg); border: 1px solid var(--yellow-border); }
  .form-group.red { background: var(--red-bg); border: 1px solid var(--red-border); }
  .form-group .form-label.green { color: var(--green-text); }
  .form-group .form-label.yellow { color: var(--yellow-text); }
  .form-group .form-label.red { color: var(--red-text); }
  .red-note { font-size: 0.82rem; color: var(--red-text); font-style: italic; }
  .btn-row { display: flex; gap: 0.65rem; margin-top: 1.5rem; }
  .btn-primary {
    flex: 1; padding: 0.7rem;
    background: var(--navy); color: #fff;
    border-radius: 0.75rem; font-weight: 700; font-size: 0.9rem;
    transition: opacity 0.15s;
  }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary.danger { background: var(--red); }
  .btn-secondary {
    padding: 0.7rem 1.2rem;
    background: #f1f5f9; color: #374151;
    border-radius: 0.75rem; font-weight: 600; font-size: 0.9rem;
  }
  .delete-text { color: var(--slate); font-size: 0.88rem; line-height: 1.6; margin-bottom: 0.5rem; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── Storage ────────────────────────────────────────────────────────────────
const HABITS_KEY = 'showup-habits';
const LOG_KEY    = 'showup-log';

function loadData() {
  try { return JSON.parse(localStorage.getItem(HABITS_KEY)) || []; } catch { return []; }
}
function saveHabits(habits) {
  localStorage.setItem(HABITS_KEY, JSON.stringify(habits));
}
function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || {}; } catch { return {}; }
}
function saveLog(log) {
  localStorage.setItem(LOG_KEY, JSON.stringify(log));
}

// ─── Dates ──────────────────────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().split('T')[0]; }
function last30() {
  return Array.from({length:30}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - (29-i));
    return d.toISOString().split('T')[0];
  });
}
function getStreak(log, habitId) {
  let streak = 0;
  const d = new Date();
  const today = todayKey();
  while (true) {
    const key = d.toISOString().split('T')[0];
    const s = (log[key] || {})[habitId];
    if (s === 'green' || s === 'yellow') {
      streak++;
      d.setDate(d.getDate()-1);
    } else if (key === today && !s) {
      d.setDate(d.getDate()-1);
      const prev = d.toISOString().split('T')[0];
      const ps = (log[prev] || {})[habitId];
      if (ps === 'green' || ps === 'yellow') { streak++; d.setDate(d.getDate()-1); continue; }
      break;
    } else break;
  }
  return streak;
}

// ─── State ──────────────────────────────────────────────────────────────────
let state = {
  habits: loadData(),
  log: loadLog(),
  view: 'today',       // 'today' | 'about'
  modal: null,         // null | 'add' | {editing: habit} | {deleting: id}
  openHistory: {},     // habitId -> bool
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function markHabit(habitId, status) {
  const today = todayKey();
  const log = JSON.parse(JSON.stringify(state.log));
  if (!log[today]) log[today] = {};
  if (status === 'none') {
    delete log[today][habitId];
  } else {
    log[today][habitId] = status;
  }
  saveLog(log);
  setState({log});
}

function addHabit(name, green, yellow) {
  const habits = [...state.habits, {id: Date.now().toString(), name, green, yellow}];
  saveHabits(habits);
  setState({habits, modal: null});
}

function editHabit(id, name, green, yellow) {
  const habits = state.habits.map(h => h.id === id ? {...h, name, green, yellow} : h);
  saveHabits(habits);
  setState({habits, modal: null});
}

function deleteHabit(id) {
  const habits = state.habits.filter(h => h.id !== id);
  saveHabits(habits);
  setState({habits, modal: null});
}

// ─── Render helpers ──────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'disabled') { if(v) e.disabled = true; }
    else e.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child === null || child === undefined) continue;
    if (typeof child === 'string' || typeof child === 'number') e.appendChild(document.createTextNode(child));
    else e.appendChild(child);
  }
  return e;
}

function mkDot(status) {
  return el('div', {class: `dot ${status !== 'none' ? status : ''}`});
}

// ─── Components ──────────────────────────────────────────────────────────────
function renderHabitCard(habit) {
  const today = todayKey();
  const todayStatus = (state.log[today] || {})[habit.id] || 'none';
  const streak = getStreak(state.log, habit.id);
  const days = last30();
  const gc = days.filter(d => (state.log[d]||{})[habit.id]==='green').length;
  const yc = days.filter(d => (state.log[d]||{})[habit.id]==='yellow').length;
  const rc = days.filter(d => (state.log[d]||{})[habit.id]==='red').length;
  const showHist = !!state.openHistory[habit.id];

  // Status text
  const statusTexts = {
    none: 'Not yet logged today',
    green: `🟢 Green Day`,
    yellow: `🟡 Yellow Day`,
    red: `🔴 Red Day — the only enemy`,
  };

  // Mark buttons
  const markBtns = ['green','yellow','red'].map(s => {
    const labels = {green:'🟢 Green', yellow:'🟡 Yellow', red:'🔴 Red'};
    const activeClass = todayStatus === s ? `active-${s}` : '';
    const btn = el('button', {
      class: `mark-btn ${activeClass}`,
      onClick: () => markHabit(habit.id, todayStatus === s ? 'none' : s)
    }, todayStatus === s ? `✓ ${labels[s].split(' ')[1]}` : labels[s]);
    return btn;
  });

  // Context banner
  let banner = null;
  if (todayStatus === 'green') {
    banner = el('div', {class:'context-banner green'}, el('strong',{},'Today: '), habit.green);
  } else if (todayStatus === 'yellow') {
    banner = el('div', {class:'context-banner yellow'}, el('strong',{},'Today: '), `${habit.yellow} — `, el('em',{}, 'You still showed up.'));
  }

  // History section
  const historyToggle = el('button', {
    class: 'history-toggle',
    onClick: () => {
      const h = {...state.openHistory, [habit.id]: !showHist};
      setState({openHistory: h});
    }
  }, `${showHist ? '▲ Hide' : '▼ Last 30 days'} · Showed up ${gc+yc}/30`);

  let historySection = null;
  if (showHist) {
    const dotsRow = el('div', {class:'dots-row'}, ...days.map(d => mkDot((state.log[d]||{})[habit.id] || 'none')));
    const dotStats = el('div', {class:'dot-stats'},
      el('span',{},`🟢 ${gc}`),
      el('span',{},`🟡 ${yc}`),
      el('span',{},`🔴 ${rc}`)
    );
    historySection = el('div', {}, dotsRow, dotStats);
  }

  // Name row
  const nameRow = el('div', {style:'display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;'},
    el('span', {class:'habit-name'}, habit.name),
    streak > 1 ? el('span', {class:'streak-badge'}, `🔥 ${streak} days`) : null
  );

  const card = el('div', {class:`habit-card status-${todayStatus}`},
    el('div', {class:'card-top'},
      el('div', {style:'flex:1;min-width:0;'},
        nameRow,
        el('div', {class:`status-line ${todayStatus}`}, statusTexts[todayStatus])
      ),
      el('div', {class:'card-actions'},
        el('button', {class:'icon-btn', title:'Edit', onClick: () => setState({modal:{editing:habit}})}, '✏️'),
        el('button', {class:'icon-btn', title:'Delete', onClick: () => setState({modal:{deleting:habit.id}})}, '🗑️')
      )
    ),
    el('div', {class:'mark-row'}, ...markBtns),
    banner,
    historyToggle,
    historySection
  );
  return card;
}

function renderTodayView() {
  const today = todayKey();
  const todayLog = state.log[today] || {};
  const habits = state.habits;

  if (habits.length === 0) {
    return el('div', {class:'empty'},
      el('div', {class:'empty-icon'}, '✨'),
      el('h2', {}, 'Start building your identity'),
      el('p', {}, 'Add your first habit and define what showing up looks like — on your best days, and on your hardest ones.'),
      el('button', {class:'btn-primary-lg', onClick: () => setState({modal:'add'})}, '+ Add your first habit')
    );
  }

  const cards = habits.map(renderHabitCard);
  const logged = habits.filter(h => todayLog[h.id] && todayLog[h.id] !== 'none').length;
  const gc = Object.values(todayLog).filter(s=>s==='green').length;
  const yc = Object.values(todayLog).filter(s=>s==='yellow').length;

  let completion = null;
  if (logged === habits.length && habits.length > 0) {
    const icon = gc === habits.length ? '🌟' : yc > 0 ? '💛' : '📌';
    const title = gc === habits.length ? 'Perfect green day.' : 'You showed up.';
    const sub = gc === habits.length ? 'Every habit at its best. Exceptional.' : 'That\'s who you are — someone who shows up, even when it\'s hard.';
    completion = el('div', {class:'completion-card'},
      el('div', {class:'completion-icon'}, icon),
      el('div', {class:'completion-title'}, title),
      el('div', {class:'completion-sub'}, sub)
    );
  }

  return el('div', {class:'habits-list'}, ...cards, completion);
}

function renderAboutView() {
  return el('div', {class:'about-section'},
    el('div', {class:'about-card'},
      el('h2', {}, '"So simple it never fails"'),
      el('p', {}, 'Most habit trackers focus on your ', el('em',{},'goals'), '. This one focuses on your ', el('em',{},'identity'), '. The question isn\'t whether you hit a target — it\'s whether you\'re the kind of person who shows up.')
    ),
    el('div', {class:'about-status-card green'},
      el('div', {class:'about-status-title green'}, '🟢 Green Day — Ideal execution'),
      el('p', {}, 'You had the time, the energy, and you gave it everything. This is what you\'re capable of on your best days.')
    ),
    el('div', {class:'about-status-card yellow'},
      el('div', {class:'about-status-title yellow'}, '🟡 Yellow Day — Bare minimum'),
      el('p', {}, 'Life was chaotic. You were tired, busy, overwhelmed. But you still showed up. A yellow day is not a compromise — it\'s proof of your character.')
    ),
    el('div', {class:'about-status-card red'},
      el('div', {class:'about-status-title red'}, '🔴 Red Day — The only enemy'),
      el('p', {}, 'Zero. Nothing. This is the one outcome the system asks you to avoid at all costs. Not perfection — just never zero.')
    ),
    el('div', {class:'quote-card'}, '"A yellow day means you are still the kind of person who shows up, even when life is chaotic."')
  );
}

function renderModal() {
  if (!state.modal) return null;

  let content;

  if (state.modal === 'add') {
    content = renderHabitForm(null);
  } else if (state.modal.editing) {
    content = renderHabitForm(state.modal.editing);
  } else if (state.modal.deleting) {
    content = renderDeleteConfirm(state.modal.deleting);
  }

  const overlay = el('div', {class:'modal-overlay', onClick: () => setState({modal:null})},
    el('div', {class:'modal-box', onClick: e => e.stopPropagation()}, content)
  );
  return overlay;
}

function renderHabitForm(habit) {
  const title = habit ? 'Edit Habit' : 'New Habit';
  let nameVal = habit?.name || '';
  let greenVal = habit?.green || '';
  let yellowVal = habit?.yellow || '';

  const nameInput = el('input', {class:'form-input', type:'text', placeholder:'e.g. Exercise, Meditation, Reading…', value:nameVal});
  nameInput.value = nameVal;
  nameInput.addEventListener('input', e => { nameVal = e.target.value; updateBtn(); });

  const greenInput = el('input', {class:'form-input', type:'text', placeholder:'e.g. 45-minute workout', value:greenVal});
  greenInput.value = greenVal;
  greenInput.addEventListener('input', e => { greenVal = e.target.value; updateBtn(); });

  const yellowInput = el('input', {class:'form-input', type:'text', placeholder:'e.g. 10 push-ups', value:yellowVal});
  yellowInput.value = yellowVal;
  yellowInput.addEventListener('input', e => { yellowVal = e.target.value; updateBtn(); });

  const saveBtn = el('button', {class:'btn-primary', disabled: !(nameVal.trim()&&greenVal.trim()&&yellowVal.trim()),
    onClick: () => {
      if (!nameVal.trim()||!greenVal.trim()||!yellowVal.trim()) return;
      if (habit) editHabit(habit.id, nameVal.trim(), greenVal.trim(), yellowVal.trim());
      else addHabit(nameVal.trim(), greenVal.trim(), yellowVal.trim());
    }
  }, habit ? 'Save changes' : 'Add habit');

  function updateBtn() {
    saveBtn.disabled = !(nameVal.trim()&&greenVal.trim()&&yellowVal.trim());
  }

  return el('div', {},
    el('div', {class:'modal-title'}, title),
    el('div', {class:'form-stack'},
      el('div', {},
        el('label', {class:'form-label'}, 'Habit name'),
        nameInput
      ),
      el('div', {class:'form-group green'},
        el('label', {class:'form-label green'}, '🟢 Green Day — Ideal execution'),
        greenInput
      ),
      el('div', {class:'form-group yellow'},
        el('label', {class:'form-label yellow'}, '🟡 Yellow Day — Bare minimum'),
        yellowInput
      ),
      el('div', {class:'form-group red'},
        el('label', {class:'form-label red'}, '🔴 Red Day — The only enemy'),
        el('p', {class:'red-note'}, 'Going to zero. This is the one outcome the system asks you to avoid.')
      )
    ),
    el('div', {class:'btn-row'},
      el('button', {class:'btn-secondary', onClick: () => setState({modal:null})}, 'Cancel'),
      saveBtn
    )
  );
}

function renderDeleteConfirm(id) {
  return el('div', {},
    el('div', {class:'modal-title'}, 'Delete habit?'),
    el('p', {class:'delete-text'}, 'This will permanently delete this habit and all its history. This cannot be undone.'),
    el('div', {class:'btn-row'},
      el('button', {class:'btn-secondary', onClick: () => setState({modal:null})}, 'Cancel'),
      el('button', {class:'btn-primary danger', onClick: () => deleteHabit(id)}, 'Delete')
    )
  );
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const today = todayKey();
  const todayLog = state.log[today] || {};
  const habits = state.habits;
  const logged = habits.filter(h => todayLog[h.id] && todayLog[h.id] !== 'none').length;
  const gc = Object.values(todayLog).filter(s=>s==='green').length;
  const yc = Object.values(todayLog).filter(s=>s==='yellow').length;

  const dateStr = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});

  // Header
  const headerTop = el('div', {class:'header-top'},
    el('div', {},
      el('div', {class:'app-title'}, 'Show Up'),
      el('div', {class:'app-date'}, dateStr)
    ),
    el('button', {class:'btn-add-top', onClick: () => setState({modal:'add'})}, '+ Add habit')
  );

  let statsRow = null;
  if (habits.length > 0) {
    statsRow = el('div', {class:'stats-row'},
      el('div', {class:'stat-chip'},
        el('div', {class:'stat-val'}, `${logged}/${habits.length}`),
        el('div', {class:'stat-label'}, 'logged today')
      ),
      el('div', {class:'stat-chip'},
        el('div', {class:'stat-val'}, `🟢 ${gc}`),
        el('div', {class:'stat-label'}, 'green')
      ),
      el('div', {class:'stat-chip'},
        el('div', {class:'stat-val'}, `🟡 ${yc}`),
        el('div', {class:'stat-label'}, 'yellow')
      )
    );
  }

  const header = el('div', {class:'header'}, headerTop, statsRow);

  // Nav
  const navToday = el('button', {
    class: `nav-btn ${state.view==='today'?'active':''}`,
    onClick: () => setState({view:'today'})
  }, 'Today');
  const navAbout = el('button', {
    class: `nav-btn ${state.view==='about'?'active':''}`,
    onClick: () => setState({view:'about'})
  }, 'The system');
  const nav = el('div', {class:'nav'}, navToday, navAbout);

  // Content
  const content = state.view === 'today' ? renderTodayView() : renderAboutView();
  const main = el('div', {class:'main'}, content);

  // Modal
  const modal = renderModal();

  app.append(header, nav, main);
  if (modal) app.append(modal);
}

// ─── Init ────────────────────────────────────────────────────────────────────
render();
</script>

<!-- PWA Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'showup-v1';
    const ASSETS = ['/show-up/'];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'}).catch(() => {});
}
</script>
